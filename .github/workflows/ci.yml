name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/*.yml'

  build:
    name: Tests on ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.build == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
          - os: windows
            runner: windows-latest
    env:
      TZ: UTC
      CGO_ENABLED: "1"
      GOTOOLCHAIN: local
      GOFLAGS: -mod=vendor
    # Use bash everywhere so the existing Makefile targets and
    # shell-style `run:` blocks work identically on Windows — bash
    # ships with the windows-latest image via Git for Windows.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - run: go version

      - name: Vendor modules
        run: go mod tidy && go mod vendor

      - name: Build
        run: make build

      - name: Run linter
        if: matrix.os == 'linux'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --timeout 10m --config .golangci.yml

      - name: Run tests
        run: go test -race -count=1 -timeout 10m -v ./...

      - name: Validate templates
        run: make validate-templates

      - name: Verify binary
        run: |
          BIN=./bin/runbook$(go env GOEXE)
          "$BIN" version
          "$BIN" --help

      - name: Upload coverage
        if: matrix.os == 'linux'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
          slug: runbookdev/runbook
