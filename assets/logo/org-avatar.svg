<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="leftPage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D3E7F5"/>
    </linearGradient>
    <linearGradient id="rightPage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5AB8EF"/>
      <stop offset="100%" stop-color="#1E7FC8"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0F3A5C"/>
      <stop offset="100%" stop-color="#1B5384"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E7F4FD"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0A2238" flood-opacity=".28"/>
    </filter>
  </defs>

  <!-- Book group: background-free, scaled to fill the frame -->
  <g transform="translate(256, 256) scale(1.18)" filter="url(#shadow)">
    <!-- Left page -->
    <path d="M-10 -176 Q-10 -194 -28 -194 L-148 -194 Q-166 -194 -166 -176 L-166 168 Q-166 186 -148 186 L-28 186 Q-10 186 -10 168 Z"
          fill="url(#leftPage)"
          stroke="#B4CFE3" stroke-width="1.25"/>

    <!-- Doc lines -->
    <g stroke-linecap="round">
      <line x1="-140" y1="-132" x2="-62" y2="-132" stroke="#2F83BF" stroke-width="10"/>
      <line x1="-140" y1="-92"  x2="-36" y2="-92"  stroke="#7FAFD1" stroke-width="7"/>
      <line x1="-140" y1="-52"  x2="-52" y2="-52"  stroke="#7FAFD1" stroke-width="7"/>
      <line x1="-140" y1="-6"   x2="-80" y2="-6"   stroke="#2F83BF" stroke-width="10"/>
      <line x1="-140" y1="36"   x2="-44" y2="36"   stroke="#7FAFD1" stroke-width="7"/>
      <line x1="-140" y1="76"   x2="-60" y2="76"   stroke="#7FAFD1" stroke-width="7"/>
      <line x1="-140" y1="122"  x2="-70" y2="122"  stroke="#2F83BF" stroke-width="10"/>
    </g>

    <!-- Spine -->
    <rect x="-14" y="-190" width="28" height="376" rx="5" fill="url(#spineGrad)"/>

    <!-- Right page -->
    <path d="M10 -176 Q10 -194 28 -194 L148 -194 Q166 -194 166 -176 L166 168 Q166 186 148 186 L28 186 Q10 186 10 168 Z"
          fill="url(#rightPage)"/>

    <!-- Right page sheen -->
    <path d="M14 -176 Q14 -190 28 -190 L72 -190 L36 186 L28 186 Q14 186 14 168 Z"
          fill="#FFFFFF" opacity=".12"/>

    <!-- Hero play triangle -->
    <path d="M54 -56 L134 0 L54 56 Z" fill="url(#playGrad)" filter="url(#glow)"/>

    <!-- Stacked pages beneath -->
    <rect x="-158" y="190" width="316" height="10" rx="5" fill="#1B5384"/>
    <rect x="-148" y="200" width="296" height="7"  rx="3.5" fill="#0F3A5C"/>
  </g>
</svg>
