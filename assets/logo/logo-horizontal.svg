<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <linearGradient id="h-page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2176AE"/>
    </linearGradient>
    <linearGradient id="h-text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4D72"/>
      <stop offset="100%" stop-color="#143B59"/>
    </linearGradient>
    <filter id="h-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity=".15"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(8, 6)" filter="url(#h-shadow)">
    <!-- Left page -->
    <path d="M32 3 Q32 0 29 0 L4 0 Q0 0 0 3 L0 62 Q0 65 4 65 L29 65 Q32 65 32 62 Z" fill="#1B3F5C" opacity=".85"/>

    <!-- Doc lines -->
    <g stroke-linecap="round" opacity=".45">
      <line x1="7" y1="12" x2="17" y2="12" stroke="#3D7EAA" stroke-width="2"/>
      <line x1="7" y1="20" x2="26" y2="20" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="7" y1="27" x2="22" y2="27" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="7" y1="34" x2="24" y2="34" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="7" y1="43" x2="15" y2="43" stroke="#3D7EAA" stroke-width="2"/>
      <line x1="7" y1="50" x2="23" y2="50" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="7" y1="57" x2="20" y2="57" stroke="#2D6A8F" stroke-width="1.5"/>
    </g>

    <!-- Spine -->
    <rect x="30" y="1" width="4" height="63" rx="1" fill="#0E2233"/>

    <!-- Right page -->
    <path d="M32 3 Q32 0 35 0 L60 0 Q64 0 64 3 L64 62 Q64 65 60 65 L35 65 Q32 65 32 62 Z" fill="url(#h-page)"/>

    <!-- Play button -->
    <path d="M42 22 L56 32.5 L42 43 Z" fill="#FFFFFF" opacity=".95"/>

    <!-- Stacked page -->
    <rect x="2" y="66" width="60" height="3" rx="1.5" fill="#122E42"/>
  </g>

  <!-- Wordmark -->
  <text x="92" y="51" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="38" font-weight="700" fill="url(#h-text)" letter-spacing="1">runbook</text>
</svg>
