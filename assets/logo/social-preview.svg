<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091E2C"/>
      <stop offset="50%" stop-color="#0D2B40"/>
      <stop offset="100%" stop-color="#112F46"/>
    </linearGradient>
    <linearGradient id="sp-page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2176AE"/>
    </linearGradient>
    <linearGradient id="sp-play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D6EAF8"/>
    </linearGradient>
    <linearGradient id="sp-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E86C1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2E86C1" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#2E86C1" stop-opacity="0"/>
    </linearGradient>
    <filter id="sp-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sp-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#sp-bg)"/>

  <!-- Subtle grid -->
  <g opacity=".025" stroke="#FFFFFF" stroke-width=".5">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Ambient glow behind book -->
  <circle cx="490" cy="240" r="120" fill="#2E86C1" opacity=".04"/>

  <!-- Book icon -->
  <g transform="translate(436, 150)" filter="url(#sp-shadow)">
    <!-- Left page -->
    <path d="M50 5 Q50 0 46 0 L5 0 Q0 0 0 5 L0 90 Q0 95 5 95 L46 95 Q50 95 50 90 Z" fill="#1B3F5C" opacity=".85"/>

    <!-- Doc lines -->
    <g stroke-linecap="round" opacity=".45">
      <line x1="9" y1="16" x2="21" y2="16" stroke="#3D7EAA" stroke-width="2.5"/>
      <line x1="9" y1="26" x2="40" y2="26" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="9" y1="35" x2="34" y2="35" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="9" y1="44" x2="38" y2="44" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="9" y1="55" x2="19" y2="55" stroke="#3D7EAA" stroke-width="2.5"/>
      <line x1="9" y1="65" x2="36" y2="65" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="9" y1="74" x2="30" y2="74" stroke="#2D6A8F" stroke-width="1.5"/>
      <line x1="9" y1="83" x2="33" y2="83" stroke="#2D6A8F" stroke-width="1.5"/>
    </g>

    <!-- Spine -->
    <rect x="48" y="2" width="4" height="91" rx="1" fill="#0E2233"/>

    <!-- Right page -->
    <path d="M50 5 Q50 0 54 0 L95 0 Q100 0 100 5 L100 90 Q100 95 95 95 L54 95 Q50 95 50 90 Z" fill="url(#sp-page)"/>

    <!-- Play button -->
    <path d="M62 32 L82 47.5 L62 63 Z" fill="url(#sp-play)" filter="url(#sp-glow)" opacity=".95"/>

    <!-- Stacked pages -->
    <rect x="3" y="97" width="94" height="4" rx="2" fill="#122E42"/>
    <rect x="7" y="101" width="86" height="3" rx="1.5" fill="#0E2233"/>
  </g>

  <!-- Wordmark -->
  <text x="558" y="222" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="2">runbook</text>

  <!-- Tagline -->
  <text x="640" y="316" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#7FB3D8" letter-spacing="1">Executable runbooks as code</text>

  <text x="640" y="356" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#5D6D7E">Documentation and automation in a single file format</text>

  <!-- Accent line -->
  <rect x="440" y="400" width="400" height="2" rx="1" fill="url(#sp-accent)"/>

  <!-- Feature pills -->
  <g transform="translate(640, 440)" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" text-anchor="middle">
    <g transform="translate(-200, 0)">
      <rect x="-52" y="-12" width="104" height="24" rx="12" fill="#2E86C1" opacity=".15"/>
      <text y="4" fill="#5DADE2">Prechecks</text>
    </g>
    <g transform="translate(-68, 0)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#2E86C1" opacity=".15"/>
      <text y="4" fill="#5DADE2">Rollback</text>
    </g>
    <g transform="translate(68, 0)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#2E86C1" opacity=".15"/>
      <text y="4" fill="#5DADE2">Audit Log</text>
    </g>
    <g transform="translate(200, 0)">
      <rect x="-56" y="-12" width="112" height="24" rx="12" fill="#2E86C1" opacity=".15"/>
      <text y="4" fill="#5DADE2">Env-Aware</text>
    </g>
  </g>

  <!-- URL -->
  <text x="640" y="510" text-anchor="middle" font-family="'SF Mono', 'Consolas', monospace" font-size="14" fill="#4A6B82">github.com/runbookdev/runbook</text>
</svg>
